name: npm-publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency: npm-publish
    environment: npm-publish
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is missing. Add it in repository or environment secrets." >&2
            exit 1
          fi
          npm whoami

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version > /dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already exists on npm. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} is new. Proceeding to publish."
          fi

      - name: Validate package
        if: steps.npm_check.outputs.should_publish == 'true'
        run: npm run typecheck && npm run build && npm run check:pack

      - name: Publish package
        if: steps.npm_check.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Skip publish (version exists)
        if: steps.npm_check.outputs.should_publish != 'true'
        run: echo "Nothing to publish."
